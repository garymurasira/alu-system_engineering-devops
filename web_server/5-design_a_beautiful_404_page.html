<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f9f9f9; color: #333; text-align: center; margin: 0; }
        h1 { font-size: 120px; color: #e74c3c; line-height: 1; }
        h2 { font-size: 24px; margin: 10px 0 20px; color: #555; }
        p { font-size: 14px; color: #999; margin-bottom: 30px; }
        a { padding: 12px 30px; background: #e74c3c; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>Ceci n'est pas une page</p>
    <a href="/">Go Home</a>
</body>
</html>
